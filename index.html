<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr. Kluck's Egg Hunt</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D8C27">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
</head>
<body>
    <div id="game-container"></div>

    <script src="./resources/phaser/phaser.min.js"></script>
    <script>
    fetch('./manifest.json').then(r => r.json()).then(m => {
        window.APP_VERSION = m.version || '(Unknown)';
        const s = document.createElement('script');
        s.src = './game.js?v=' + encodeURIComponent(window.APP_VERSION);
        document.body.appendChild(s);
    }).catch(() => {
        window.APP_VERSION = '(Unknown)';
        const s = document.createElement('script');
        s.src = './game.js';
        document.body.appendChild(s);
    });
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(function() {
                console.log('Service Worker Registered');
            })
            .catch(function(error) {
                console.error('Service Worker registration failed:', error);
            });
    }
    </script>
</body>
</html>
